<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI游戏测评</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafaf9;--card:#fff;--border:#e7e5e4;--text:#1c1917;--dim:#78716c;--light:#a8a29e;--accent:#ea580c;--abg:#fff7ed;--abr:#fed7aa;--dark:#1c1917;--green:#166534;--gbg:#dcfce7;--yellow:#92400e;--ybg:#fef3c7;--red:#dc2626;--rbg:#fef2f2;--blue:#1e40af;--bbg:#dbeafe}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:15px;padding:32px 40px}
.w{max-width:100%;margin:0 auto;display:flex;gap:0}
.main{flex:1;min-width:0;max-width:100%;padding-right:14px}
.side{width:380px;flex-shrink:0;position:sticky;top:12px;height:calc(100vh - 24px);overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:12px;line-height:1.7}
.side::-webkit-scrollbar{width:3px}.side::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.side h3{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:8px}
.side h4{font-size:14px;font-weight:600;margin:8px 0 3px;padding-top:6px;border-top:1px solid var(--border)}
.side .focus{font-style:italic;color:var(--dim);margin-bottom:3px}
.side .row{display:flex;gap:4px;margin-bottom:2px}
.side .row b{min-width:12px;flex-shrink:0}
.side .row b.c0{color:var(--red)}.side .row b.c1{color:#b45309}.side .row b.c2{color:var(--blue)}.side .row b.c3{color:var(--green)}
.hd{text-align:center;padding:36px 32px;background:linear-gradient(135deg,#1c1917,#44403c);border-radius:12px;color:#fff;margin-bottom:14px}
.hd h1{font-size:26px;font-weight:700;margin:6px 0}.hd p{font-size:10px;opacity:.5}
.badge{display:inline-block;background:var(--accent);padding:2px 8px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:2px}
.tabs{display:flex;gap:3px;justify-content:center;margin-bottom:12px}
.tab{padding:11px 24px;border:1px solid var(--border);background:var(--card);border-radius:7px;cursor:pointer;font-size:15px;font-weight:500}
.tab.active{background:var(--dark);color:#fff;border-color:var(--dark)}
.s{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.sh{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.sn{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;background:var(--accent)}
.st{font-size:18px;font-weight:700}
.sd{color:var(--dim);font-size:14px;margin-bottom:5px;line-height:1.6}
.prompt-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px;font-size:14px;margin-bottom:8px;cursor:pointer;line-height:1.5}
.prompt-box{position:relative}
.prompt-box::after{content:"\590D\5236";position:absolute;top:8px;right:10px;font-size:10px;padding:2px 8px;background:var(--accent);color:#fff;border-radius:4px;pointer-events:none}
.prompt-box.copied::after{content:"\2713";background:var(--green)}

.prompt-box:hover{border-color:var(--accent)}
.prompt-box.copied{border-color:var(--green)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:5px}
.sp{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.sp-name{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:4px}
.sr{display:flex;align-items:center;gap:3px;margin-bottom:2px}
.sl{font-size:12px;color:var(--dim);width:80px}
.sb{display:flex;gap:1px}
.sc{width:34px;height:34px;border:1px solid var(--border);background:var(--card);color:var(--dim);border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;position:relative}
.sc:hover{border-color:var(--dim)}
.sc.a0{background:var(--rbg);border-color:var(--red);color:var(--red)}
.sc.a1{background:var(--ybg);border-color:#b45309;color:var(--yellow)}
.sc.a2{background:var(--bbg);border-color:var(--blue);color:var(--blue)}
.sc.a3{background:var(--gbg);border-color:var(--green);color:var(--green)}
.sc .tp{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:var(--dark);border-radius:5px;padding:5px 7px;font-size:8px;color:#fff;width:140px;z-index:99;line-height:1.3;font-weight:400;white-space:normal}
.sc:hover .tp{display:block}
.extras{display:flex;gap:8px;margin-top:6px;align-items:center;flex-wrap:wrap}
.extras input{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:6px 9px;font-size:12px;flex:1;min-width:50px;color:var(--text)}
.extras input:focus{outline:none;border-color:var(--accent)}
.tm{font-family:monospace;font-size:14px;color:var(--accent);min-width:28px}
.tb{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:7px;display:flex;align-items:center;justify-content:center}
.ac{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:8px;position:relative}
.ac .rm{position:absolute;top:6px;right:6px;width:16px;height:16px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:8px;display:flex;align-items:center;justify-content:center;color:var(--red)}
.ar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px}
.ar input,.ar select{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-size:13px}
.ar input:focus,.ar select:focus{outline:none;border-color:var(--accent)}
.cg{display:flex;gap:3px;flex-wrap:wrap;margin:3px 0}
.cg label{display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer;padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:var(--card)}
.cg label:has(input:checked){background:var(--abg);border-color:var(--abr);color:var(--accent);font-weight:500}
.cg input{display:none}
.cg .x{margin-left:2px;color:var(--red);cursor:pointer;font-size:7px}
.lo{margin-top:10px;padding:10px 14px;background:var(--card);border:1px solid var(--abr);border-radius:5px;font-size:11px;display:flex;align-items:center;gap:5px;word-break:break-all;color:var(--dim)}
.lo .cp{padding:6px 14px;background:var(--accent);border:none;border-radius:4px;font-size:9px;cursor:pointer;color:#fff;white-space:nowrap}
.lbl{font-size:12px;font-weight:600;margin:5px 0 2px;color:var(--dim)}
.lbl span{color:var(--accent);cursor:pointer;margin-left:4px}.lbl .cl{color:var(--light);cursor:pointer;margin-left:3px}
.submit-bar{position:sticky;bottom:0;background:var(--card);border:1px solid var(--border);padding:9px 12px;margin-top:10px;display:flex;align-items:center;justify-content:space-between;border-radius:9px;box-shadow:0 -2px 6px rgba(0,0,0,.03)}
.submit-btn{background:var(--accent);color:#fff;border:none;padding:14px 36px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.submit-btn:disabled{opacity:.4}
table.dt{width:100%;border-collapse:collapse;font-size:13px;margin-top:5px}
table.dt th,table.dt td{padding:8px 10px;border:1px solid var(--border);text-align:center}
table.dt th{background:var(--bg);font-size:11px;font-weight:600;color:var(--dim)}
.refresh-btn{padding:4px 10px;background:var(--abg);border:1px solid var(--abr);border-radius:5px;font-size:9px;cursor:pointer;color:var(--accent);font-weight:500}
.toast{position:fixed;bottom:14px;right:14px;background:var(--dark);color:#fff;padding:7px 12px;border-radius:7px;font-size:12px;opacity:0;transform:translateY(10px);transition:all .3s;z-index:9999}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:900px){.w{flex-direction:column}.side{width:100%;position:static;height:auto;margin-top:10px}}

.img-zone{margin-top:6px;border:2px dashed var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color .2s,background .2s}
.img-zone:focus{border-color:var(--accent);outline:none;background:rgba(234,88,12,.03)}
.img-zone:focus .img-zone-label b{color:var(--accent)}
.img-zone.drag-over{border-color:var(--accent);background:rgba(234,88,12,.05)}
.img-zone-label{font-size:11px;color:var(--dim);margin-bottom:6px}
.img-zone-label b{color:var(--light);font-weight:600}
.img-list{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.img-thumb{position:relative;width:64px;height:64px;border-radius:5px;overflow:hidden;border:1px solid var(--border)}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-del{position:absolute;top:2px;right:2px;width:16px;height:16px;background:var(--red);color:#fff;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-add{width:64px;height:64px;border:2px dashed var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--light);transition:border-color .2s}
.img-add:hover{border-color:var(--accent);color:var(--accent)}

.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.show{display:flex}
.lightbox img{max-width:90%;max-height:90%;border-radius:8px;box-shadow:0 4px 30px rgba(0,0,0,.5)}

.extras textarea{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:6px 9px;font-size:12px;font-family:inherit;line-height:1.5;overflow:hidden;box-sizing:border-box;width:100%}
</style>
</head>
<body>
<div class="w">
<div class="main">
<div class="hd"><div class="badge">v3.0</div><h1 id="title">AI 游戏测评</h1><p id="sub"></p></div>

</div>

<script>
const REPO='tlswa-123/ai-game-eval',TK=localStorage.getItem('gh_token')||new URLSearchParams(location.search).get('token')||'';
const BASE=location.origin+location.pathname;
// ===== RUBRICS =====
const DIMS_12=[
{k:'stability',name:'功能稳定性',focus:'是否影响游戏的运行？',d:['有致命bug，无法启动（进不去/点击没反应/崩溃/报错/卡死）','能运行但核心功能有明显缺失或异常，严重影响体验（核心按钮失效/素材遮挡/被迫刷新）','核心循环可整局跑完，仅1~2个不打断主流程的小瑕疵（如首帧白屏后正常）','零Bug，反复多局测试均稳定，无任何报错/卡顿/资源缺失']},
{k:'visual',name:'视觉品质',focus:'视觉表达与反馈，是否有效',d:['核心元素缺失或无法辨认，视觉观感意义不明，难以体现游戏类型','核心元素可辨识，能看出特色，但画风/动效/排版有瑕疵不协调','素材齐全，画风统一，主题清晰，一眼看出类型，整体协调','有点睛设计或记忆点，有爽感/沉浸感/冲击感/解压感']},
{k:'audio',name:'音效品质',focus:'音效和BGM表达与反馈，是否有效',d:['音效或BGM存在基础质量问题，严重刺耳/错位/爆音；或完全无声音','至少有音效或BGM之一，但操作反馈/主题契合/音量听感有瑕疵','配乐完整，音效和BGM都有，主题契合，听感正常，但感受平平','综合听感能调动情绪——音效有层次递进、BGM有节奏切换、与玩法精确同步']},
{k:'faithfulness',name:'指令还原度',focus:'prompt有，做了没？做得好不好？',d:['几乎未实现prompt要求，严重跑题，或自作主张换核心机制','实现了大部分，但存在明显遗漏或理解偏差（更改/扭曲原始指令）','所有要求都已实现，逻辑无遗漏无偏移，逐条都能勾上','完整实现 + 加入合理额外细节扩展，加分不喧宾夺主']},
{k:'gameplay',name:'玩法设计',focus:'玩法机制是否吸引人？',d:['玩法不成立——核心机制错误、规则矛盾、死循环或无法通关','能玩，但交互/数值/难度设计失衡，或不易理解与使用','核心玩法合理，逻辑合理，数值节奏均衡，难易合理，有清晰目标','有惊喜——机制/数值/关卡至少一项出彩，吸引持续游玩，易懂好上手']},
{k:'subjective',name:'主观综合评价',focus:'想不想主动玩或主动分享？',d:['第一眼劝退，或玩了一半想关掉（第一印象）','看起来有意思，实际玩几把就无感，不会主动再打开（进一步体验）','有点上头，可以收藏下次玩，感觉是完整的游戏（主动玩）','好玩有意思！想分享出去，感觉完成度高，是成熟游戏（主动传播）']}
];
const DIMS_3=[
{k:'intent',name:'意图理解',d:['完全答非所问','大方向对但细节有偏差','准确理解用户要改什么','精确理解且主动考虑到关联影响']},
{k:'precision',name:'修改精准度',d:['没修改或改错地方','改了但牵连其他部分/引入新Bug','只改了该改的，无新Bug','精准修改且优化了相关代码质量']},
{k:'completeness',name:'修改完成度',d:['没有执行修改','只做了一小部分','80%以上要求完成','全部完成，无遗漏']},
{k:'quality',name:'修改后质量',d:['改崩了，比修改前更差','勉强改了但质量下降','持平或略有提升','明显变好，整体质量提升']},
{k:'subjective',name:'主观综合评价',focus:'想不想主动玩或主动分享？',d:['第一眼劝退，或玩了一半想关掉（第一印象）','看起来有意思，玩几把无感了，不会主动再打开（进一步体验）','有点上头，可以收藏下次玩，是完整的游戏（主动玩）','好玩有意思！想分享出去，完成度高，成熟游戏（主动传播）']}
];
// Short tips for hover
const SHORT_12=['致命bug/无法启动','能跑但核心异常','正常仅小瑕疵','零Bug稳定','元素缺失/意义不明','可辨识但不协调','统一清晰协调','有点睛/沉浸感','无声/刺耳/爆音','有但瑕疵','完整契合正常','调动情绪/层次','跑题/换机制','有遗漏/偏差','全部实现','完整+合理扩展','机制不成立','能玩但失衡','合理均衡','有惊喜出彩','第一眼劝退','玩几把无感','想收藏下次玩','想分享出去'];
const SHORT_3=['答非所问','方向对有偏差','准确理解','精确+关联','改错/没改','牵连新Bug','精准无Bug','精准+优化','没执行','一小部分','80%完成','全部完成','改崩了','质量下降','持平/提升','明显变好','第一眼劝退','玩几把无感','想收藏下次玩','想分享出去'];
// ===== CASES =====
const SCENES=[{id:'s1',name:'场景1：冲突处理',rounds:[{p:'消除后不要再生成新水果了，让格子慢慢清空就过关。做成无尽模式让玩家能一直玩停不下来',n:'不补水果vs无尽矛盾'},{p:'把格子改成6x6但每行只能放5个水果',n:'6列vs每行5个矛盾'},{p:'把水果种类从6种加到12种，同时要求3个相同的连成一排才能消除',n:'12种极难凑3连'}]},{id:'s2',name:'场景2：改玩法',rounds:[{p:'把无尽模式改成60秒限时模式，时间到显示最终得分',n:''},{p:'加一个combo连击系统，连续消除3次以上额外加50分，显示combo x3文字',n:''},{p:'加一个特殊道具，满足特定条件时生成，点击可消除周围一圈',n:''}]},{id:'s3',name:'场景3：改美术',rounds:[{p:'把所有元素图标换成宝石主题',n:''},{p:'背景换成太空星空主题，深色的',n:''},{p:'整体画风从卡通改成像素复古风格',n:''}]},{id:'s4',name:'场景4：多条指令',rounds:[{p:'帮我改三个地方：1.背景改成黑色 2.加个60秒倒计时 3.分数字体放大两倍',n:''},{p:'再改三个：1.加操作音效 2.动画改成爆炸粒子效果 3.加一个历史最高分显示',n:''},{p:'最后改两个：1.加一个暂停按钮在右上角 2.加一个重新开始按钮在暂停旁边',n:''}]},{id:'s5',name:'场景5：模糊反馈',rounds:[{p:'感觉不太好玩',n:''},{p:'太简单了，没什么挑战',n:''},{p:'颜色太多了眼花',n:''}]}];
const GDD_CASES=[{num:1,name:'对对连消'},{num:2,name:'奇妙不停消'},{num:3,name:'挪一挪大师'},{num:4,name:'旅行餐车'},{num:5,name:'最美消消消'},{num:6,name:'星星喜消消'},{num:7,name:'收贝经典方块'},{num:8,name:'密室消除7'},{num:9,name:'萌小贝迷你小镇'},{num:10,name:'吃碰杠胡了'}];
const DIRECT_CASES=[{num:1,name:'连连看',p:'做个连连看游戏，网格里找两个相同图案，不超过两个拐角的路径连起来就消除'},{num:2,name:'方向逃离',p:'做个解谜消除游戏，棋盘上有带方向箭头的动物，点击沿方向飞出边界消除'},{num:3,name:'中式水墨',p:'做一个中国风水墨画风格的休闲游戏，宣纸背景，墨色晕染'},{num:4,name:'泡泡龙',p:'做个泡泡龙游戏，清新卡通，从底部发射泡泡3个同色消除'},{num:5,name:'合成大西瓜',p:'做一个合成大西瓜类游戏，两个相同水果碰到合成更大的'},{num:6,name:'星星消除',p:'太空主题消除，点击相连同色方块消除，要有combo'},{num:7,name:'推牌消除',p:'麻将消除，滑动行列让相同牌相邻配对消除'},{num:8,name:'俄罗斯方块',p:'像素复古俄罗斯方块，方块下落控制旋转填满消行'},{num:9,name:'宝石三消',p:'宝石三消，3D圆润风格，交换相邻宝石3连消除'},{num:10,name:'液体排序',p:'极简液体排序，纯黑底白轮廓试管，5色液体'},{num:11,name:'赛博朋克',p:'赛博朋克霓虹风格游戏，深黑底霓虹发光'},{num:12,name:'塔防',p:'卡通扁平塔防，3种塔10波递增有Boss'},{num:13,name:'射击',p:'赛博朋克太空射击，飞船滑动自动射击'},{num:14,name:'跑酷',p:'手绘涂鸦横版跑酷，自动跑点击跳跃'},{num:15,name:'堆叠点消',p:'2D层叠消除，遮挡点击飞入7格槽凑3消除'}];
const MULTI_BASE='做个水果三消游戏，8x8的格子，点击两个相邻水果交换位置，3个以上同类水果连成一排就消除，消除后上面的水果掉下来补位，要有分数显示和连击combo效果';
const DEF_PLATS=['我们+Claude4.7','我们+GLM5.1','WB+Claude4.7','WB+GLM5.1','Astrocade','Replit','TapTap制造'];
let custPlats=JSON.parse(localStorage.getItem('ep3')||'[]');
function allPlats(){return[...DEF_PLATS,...custPlats]}
const U=new URLSearchParams(location.search);

let scores={},timers={},fields={},at={};
async function ghPut(path,data){let sha='';try{const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{headers:{Authorization:'token '+TK}});if(r.ok)sha=(await r.json()).sha}catch(e){}const b={message:'submit',content:btoa(unescape(encodeURIComponent(data)))};if(sha)b.sha=sha;return(await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{method:'PUT',headers:{Authorization:'token '+TK,'Content-Type':'application/json'},body:JSON.stringify(b)})).ok}
async function ghList(d){const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${d}`,{headers:{Authorization:'token '+TK}});return r.ok?r.json():[]}
async function ghGet(p){const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${p}`,{headers:{Authorization:'token '+TK}});if(!r.ok)return null;const d=await r.json();return JSON.parse(decodeURIComponent(escape(atob(d.content))))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2e3)}
function cp(el,t){navigator.clipboard.writeText(t);el.classList.add('copied');setTimeout(()=>el.classList.remove('copied'),1e3)}
function fmt(s){return Math.floor(s/60)+':'+(s%60+'').padStart(2,'0')}
function tStart(k){if(at[k])return;if(!timers[k])timers[k]=0;at[k]=setInterval(()=>{timers[k]++;const e=document.getElementById('tm_'+k);if(e)e.textContent=fmt(timers[k])},1e3)}
function tStop(k){if(at[k]){clearInterval(at[k]);delete at[k]}}
function tReset(k){tStop(k);timers[k]=0;const e=document.getElementById('tm_'+k);if(e)e.textContent='0:00'}
function setS(k,v){scores[k]=v;document.querySelectorAll(`[data-k="${k}"]`).forEach(b=>{b.className='sc'+(scores[k]==+b.dataset.v?' a'+b.dataset.v:'')})}
function go(m){mode=m;render()}
function render(){
  const isTester=mode==='tester'&&cfg.name&&cfg.platforms.length;
  document.getElementById('tabs').innerHTML=isTester?'':`<button class="tab ${mode==='admin'?'active':''}" onclick="go('admin')">管理/分发</button><button class="tab ${mode==='summary'?'active':''}" onclick="go('summary')">汇总</button>`;

  if(mode==='admin'){document.getElementById('app').innerHTML=adminH();document.getElementById('side').innerHTML=''}
  else if(mode==='summary'){document.getElementById('app').innerHTML='<div class="s sd" style="text-align:center;padding:20px">加载中...</div>';document.getElementById('side').innerHTML='';loadSum()}
  else{document.getElementById('app').innerHTML=testerH();renderSide()}
}
function renderSide(){

function scoreSingle(base,dims,shorts){

  dims.forEach((dim,di)=>{
    const sk=base+'_'+dim.k;
    h+='<div class="sr"><span class="sl">'+dim.name+'</span><div class="sb">';
    for(let v=0;v<4;v++){
      const tip=shorts[di*4+v];
      h+='<button class="sc'+(scores[sk]===v?' a'+v:'')
        +'" data-k="'+sk+'" data-v="'+v+'" onclick="setS(\''+sk+'\','+v+')">'+v
        +'<span class="tp">'+v+': '+tip+'</span></button>';
    }
    h+='</div></div>';
  });
  // Subjective is now part of dims array
  // Timer + manual
  h+='<div class="extras"><span class="tm" id="tm_'+base+'">'+fmt(timers[base]||0)+'</span>';
  h+='<button class="tb" onclick="tStart(\''+base+'\')">&#9654;</button>';
  h+='<button class="tb" onclick="tStop(\''+base+'\')">||</button>';
  h+='<button class="tb" onclick="tReset(\''+base+'\')">R</button>';
  h+='<input type="number" placeholder="分钟" style="width:50px" value="'+(fields[base+'_min']||'')+'" onchange="fields[\''+base+'_min\']=this.value">';
  h+='</div>';
  // Note
  h+='<div class="extras"><textarea placeholder="备注" style="flex:1;min-height:26px;resize:vertical;overflow:hidden" oninput="this.style.height=\'auto\';this.style.height=this.scrollHeight+\'px\'" onchange="fields[\''+base+'_n\']=this.value">'+(fields[base+'_n']||'')+'</textarea></div>';
  // Images
  h+='<div class="img-zone" data-imgbase="'+base+'" tabindex="0" ondrop="dropImg(event,\''+base+'\')" ondragover="event.preventDefault();this.classList.add(\'drag-over\')" ondragleave="this.classList.remove(\'drag-over\')">';
  h+='<div class="img-zone-label">截图（点击+/拖入/Ctrl+V）</div><div class="img-list">';

  h+='</div></div>';

    dims.forEach((dim,di)=>{
      const sk=base+'_'+dim.k;
      h+='<div class="sr"><span class="sl">'+dim.name+'</span><div class="sb">';

        const tip=shorts[di*4+v];
        h+='<button class="sc'+(scores[sk]===v?' a'+v:'')+'" data-k="'+sk+'" data-v="'+v+'" onclick="setS(\''+sk+'\','+v+')">'+v+'<span class="tp">'+v+': '+tip+'</span></button>';
      }
      h+='</div></div>';
    });

    h+='<div class="extras"><span class="tm" id="tm_'+base+'">'+fmt(timers[base]||0)+'</span><button class="tb" onclick="tStart(\''+base+'\')">&#9654;</button><button class="tb" onclick="tStop(\''+base+'\')">||</button><button class="tb" onclick="tReset(\''+base+'\')">R</button><input type="number" placeholder="分钟" style="width:50px" value="'+(fields[base+'_min']||'')+'" onchange="fields[\''+base+'_min\']=this.value"><span style="font-size:11px;color:var(--light)">min</span></div>';
    // Note

    // Image upload (max 4) - supports click/drag/paste
    h+='<div class="img-zone" data-imgbase="'+base+'" tabindex="0" ondrop="dropImg(event,\''+base+'\')" ondragover="event.preventDefault();this.classList.add(\'drag-over\')" ondragleave="this.classList.remove(\'drag-over\')"">';
    h+='<div class="img-zone-label">截图（最多4张）：点击+上传 / 拖入 / <b>点击此区域后 Ctrl+V 粘贴</b></div>';
    h+='<div class="img-list">';

    if(imgs.length<4){h+='<label class="img-add"><input type="file" accept="image/*" style="display:none" onchange="addImg(\''+base+'\',this)">+</label>';}
    h+='</div></div>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function addA(){assigns.push({name:'',platforms:[],scenes:SCENES.map(s=>s.id),cases:[],target:'multi'});saveA();render()}
function rmA(i){assigns.splice(i,1);saveA();render()}
function togA(i,f,v){const a=assigns[i];if(!a[f])a[f]=[];const x=a[f].indexOf(v);if(x>=0)a[f].splice(x,1);else a[f].push(v);saveA();render()}
function rmPlat(p){const i=custPlats.indexOf(p);if(i>=0){custPlats.splice(i,1);localStorage.setItem('ep3',JSON.stringify(custPlats));assigns.forEach(a=>{if(a.platforms){const x=a.platforms.indexOf(p);if(x>=0)a.platforms.splice(x,1)}});saveA();render()}}
function selAllC(i){const a=assigns[i];const list=a.target==='gdd'?GDD_CASES:DIRECT_CASES;a.cases=list.map(c=>(a.target==='gdd'?'g':'d')+c.num);saveA();render()}
function addP(i){const el=document.getElementById('np'+i);const n=el.value.trim();if(!n)return;if(!custPlats.includes(n)&&!DEF_PLATS.includes(n)){custPlats.push(n);localStorage.setItem('ep3',JSON.stringify(custPlats))}if(!assigns[i].platforms)assigns[i].platforms=[];if(!assigns[i].platforms.includes(n))assigns[i].platforms.push(n);saveA();render()}
function saveA(){localStorage.setItem('ea5',JSON.stringify(assigns))}
function mkLink(a){if(!a.name||!(a.platforms||[]).length)return'';const tk=localStorage.getItem('gh_token')||'';let url=BASE+'?token='+encodeURIComponent(tk)+'&name='+encodeURIComponent(a.name)+'&platforms='+encodeURIComponent(a.platforms.join(','))+'&target='+a.target;if(a.target==='multi')url+='&scenes='+encodeURIComponent((a.scenes||[]).join(','));else url+='&cases='+encodeURIComponent((a.cases||[]).join(','));return url+'&mode=tester'}
// ===== SUBMIT =====
async function doSubmit(){
  const btn=document.getElementById('subBtn');btn.textContent='...';btn.disabled=true;
  const dims=getDims();
  const result={name:cfg.name,platforms:cfg.platforms,target:cfg.target,time:new Date().toISOString(),data:[]};
  cfg.platforms.forEach(plat=>{
    const pk=plat.replace(/[^a-zA-Z0-9]/g,'_');
    const pd={platform:plat,items:[]};
    if(cfg.target==='multi'){
      SCENES.filter(s=>cfg.scenes.includes(s.id)).forEach(scene=>{
        scene.rounds.forEach((r,ri)=>{
          const base=pk+'_'+scene.id+'_r'+(ri+1);
          const item={scene:scene.name,round:ri+1,scores:{},time:timers[base]||0,note:fields[base+'_n']||''};
          dims.forEach(d=>{item.scores[d.k]=scores[base+'_'+d.k]});
          const v=Object.values(item.scores).filter(x=>x!==undefined);
          item.avg=v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(2):'';
          pd.items.push(item);
        });
      });
    }else{
      const list=cfg.target==='gdd'?GDD_CASES.filter(c=>cfg.cases.includes('g'+c.num)):DIRECT_CASES.filter(c=>cfg.cases.includes('d'+c.num));
      list.forEach(c=>{
        const base=pk+'_'+(cfg.target==='gdd'?'g':'d')+c.num;
        const item={name:c.name,num:c.num,scores:{},time:timers[base]||0,note:fields[base+'_n']||''};
        dims.forEach(d=>{item.scores[d.k]=scores[base+'_'+d.k]});
        const v=Object.values(item.scores).filter(x=>x!==undefined);
        item.avg=v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(2):'';
        pd.items.push(item);
      });
    }
    result.data.push(pd);
  });
  const ok=await ghPut('data/'+cfg.name+'_'+Date.now()+'.json',JSON.stringify(result,null,2));
  btn.textContent=ok?'OK':'fail';if(ok)toast('已提交');else btn.disabled=false;
}

      sl+='<div style="display:flex;gap:8px;margin-top:6px">';
      sl+='<button style="padding:4px 12px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer" onclick="viewSubmit('+di+')">查看详情</button>';
      sl+='<button style="padding:4px 12px;background:var(--bg);color:var(--red);border:1px solid var(--red);border-radius:4px;font-size:11px;cursor:pointer" onclick="delSubmit(\''+fileName+'\','+di+')">删除</button>';
      sl+='</div></div></div>';
    });
    const el=document.getElementById('submitList');
    if(el)el.innerHTML=sl;
  },0);
}
function renderTargetAnalysis(title,data,dims){
  // Collect per-platform stats
  const platStats={};
  data.forEach(d=>{(d.data||[]).forEach(pd=>{
    if(!platStats[pd.platform])platStats[pd.platform]={dimSums:{},dimCounts:{},totalScores:[],totalTime:0,subjScores:[]};
    const ps=platStats[pd.platform];
    dims.forEach(dim=>{if(!ps.dimSums[dim.k]){ps.dimSums[dim.k]=0;ps.dimCounts[dim.k]=0}});
    (pd.items||[]).forEach(item=>{
      let itemTotal=0,itemCount=0;
      dims.forEach(dim=>{
        const v=(item.scores||{})[dim.k];
        if(v!==undefined&&v!==null){ps.dimSums[dim.k]+=v;ps.dimCounts[dim.k]++;itemTotal+=v;itemCount++}
      });
      if(itemCount)ps.totalScores.push(itemTotal/itemCount);
      ps.totalTime+=(item.time||0);
      if(item.scores&&item.scores.subjective!==undefined)ps.subjScores.push(item.scores.subjective);
    });
  })});
  const platforms=Object.keys(platStats);
  if(!platforms.length)return'';
  const avg=arr=>arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2):'-';
  const avgN=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;
  // Platform comparison table
  let h='<div class="s"><div class="sh"><div class="sn" style="background:var(--blue)">'+title[0]+'</div><div class="st">'+title+'</div></div>';
  // Main comparison table
  h+='<table class="dt"><tr><th>平台</th>';
  dims.forEach(d=>{h+='<th>'+d.name+'</th>'});
  h+='<th style="color:var(--accent)">客观总分</th><th>耗时(秒)</th></tr>';
  // Calculate all values first for min/max highlighting
  const dimAvgs={};
  dims.forEach(dim=>{dimAvgs[dim.k]=platforms.map(p=>{const ps=platStats[p];return ps.dimCounts[dim.k]?ps.dimSums[dim.k]/ps.dimCounts[dim.k]:0})});
  const totalAvgs=platforms.map(p=>avgN(platStats[p].totalScores));
  const totalTimes=platforms.map(p=>platStats[p].totalTime);
  platforms.forEach((p,pi)=>{
    const ps=platStats[p];
    h+='<tr><td><b>'+p+'</b></td>';
    dims.forEach(dim=>{
      const val=ps.dimCounts[dim.k]?(ps.dimSums[dim.k]/ps.dimCounts[dim.k]).toFixed(2):'-';
      const vals=dimAvgs[dim.k];
      const isMax=vals[pi]===Math.max(...vals)&&vals[pi]>0;
      const isMin=vals[pi]===Math.min(...vals)&&platforms.length>1;
      const style=isMax?'color:var(--green);font-weight:700':isMin?'color:var(--red)':'';
      h+='<td style="'+style+'">'+val+'</td>';
    });
    const totalVal=ps.totalScores.length?avgN(ps.totalScores).toFixed(2):'-';
    const isMaxT=totalAvgs[pi]===Math.max(...totalAvgs)&&totalAvgs[pi]>0;
    const isMinT=totalAvgs[pi]===Math.min(...totalAvgs)&&platforms.length>1;
    h+='<td style="'+(isMaxT?'color:var(--green);font-weight:700':isMinT?'color:var(--red);font-weight:700':'color:var(--accent);font-weight:700')+'">'+totalVal+'</td>';
    const timeVal=ps.totalTime||0;
    const isMaxTime=totalTimes[pi]===Math.max(...totalTimes)&&platforms.length>1;
    const isMinTime=totalTimes[pi]===Math.min(...totalTimes)&&totalTimes[pi]>0;
    h+='<td style="'+(isMinTime?'color:var(--green)':isMaxTime?'color:var(--red)':'')+'">'+timeVal+'</td>';
    h+='</tr>';
  });
  h+='</table>';
  // Bar chart - overall score
  const sorted=platforms.map((p,i)=>({p,s:totalAvgs[i]})).sort((a,b)=>b.s-a.s);
  h+='<div style="margin-top:10px">';
  sorted.forEach((x,i)=>{
    const pct=Math.round(x.s/3*100);
    const color=i===0?'var(--green)':i===sorted.length-1&&sorted.length>1?'var(--red)':'var(--accent)';
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:12px"><span style="width:90px;font-weight:600;text-align:right">'+x.p+'</span><div style="flex:1;height:14px;background:var(--bg);border-radius:3px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:'+color+';border-radius:3px;transition:width .3s"></div></div><span style="font-weight:700;color:'+color+';width:30px">'+x.s.toFixed(2)+'</span></div>';
  });
  h+='</div>';
  // Dimension radar-like comparison (simple horizontal bars per dim)
  h+='<div style="margin-top:10px;font-size:12px;font-weight:600;color:var(--dim);margin-bottom:4px">各维度对比</div>';
  dims.forEach(dim=>{
    h+='<div style="margin-bottom:6px"><div style="font-size:12px;color:var(--dim);margin-bottom:2px">'+dim.name+'</div>';
    platforms.forEach(p=>{
      const ps=platStats[p];
      const val=ps.dimCounts[dim.k]?ps.dimSums[dim.k]/ps.dimCounts[dim.k]:0;
      const pct=Math.round(val/3*100);
      h+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:1px"><span style="width:70px;font-size:11px;text-align:right;color:var(--dim)">'+p+'</span><div style="flex:1;height:8px;background:var(--bg);border-radius:2px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:var(--accent);border-radius:2px"></div></div><span style="font-size:11px;width:28px;color:var(--accent)">'+val.toFixed(1)+'</span></div>';
    });
    h+='</div>';
  });
  h+='</div>';
  return h;
}
function viewSubmit(idx){
  const d=window._d[idx];
  let detail='<div class="s"><button onclick="loadSum()" style="padding:4px 10px;border:1px solid var(--border);background:var(--card);border-radius:4px;font-size:11px;cursor:pointer;margin-bottom:10px">← 返回汇总</button>';
  detail+='<div class="st">'+d.name+' 的提交详情</div><div class="sd">'+new Date(d.time).toLocaleString('zh-CN')+'</div>';
  (d.data||[]).forEach(pd=>{
    detail+='<div style="margin:8px 0 4px;font-weight:700;color:var(--accent)">'+pd.platform+'</div>';
    detail+='<table class="dt"><tr><th>项目</th><th>均分</th><th>耗时</th><th>备注</th></tr>';
    (pd.items||[]).forEach(item=>{
      detail+='<tr><td>'+(item.scene||item.name||'轮'+item.round)+'</td><td style="font-weight:700;color:var(--accent)">'+(item.avg||'-')+'</td><td>'+(item.time||0)+'s</td><td>'+(item.note||'')+'</td></tr>';
    });
    detail+='</table>';
  });
  detail+='</div>';
  document.getElementById('app').innerHTML=detail;
}
async function delSubmit(fileName,idx){
  if(!confirm('确定删除这份提交？'))return;
  if(!fileName){toast('无法删除');return}
  const r=await fetch('https://api.github.com/repos/'+REPO+'/contents/data/'+fileName,{headers:{Authorization:'token '+TK}});
  if(!r.ok){toast('删除失败');return}
  const d=await r.json();
  const del=await fetch('https://api.github.com/repos/'+REPO+'/contents/data/'+fileName,{method:'DELETE',headers:{Authorization:'token '+TK,'Content-Type':'application/json'},body:JSON.stringify({message:'delete',sha:d.sha})});
  if(del.ok){toast('已删除');loadSum()}else{toast('删除失败')}
}
function expAll(){
  const all=window._d||[];const wb=XLSX.utils.book_new();const rows=[];
  all.forEach(d=>{(d.data||[]).forEach(pd=>{(pd.items||[]).forEach(item=>{const row={人:d.name,平台:pd.platform,目标:d.target,场景:item.scene||'',名称:item.name||'',轮:item.round||''};Object.entries(item.scores||{}).forEach(([k,v])=>row[k]=v);row['均分']=item.avg;row['耗时']=item.time;row['备注']=item.note;rows.push(row)})})});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'data');
  XLSX.writeFile(wb,'eval_'+new Date().toISOString().slice(0,10)+'.xlsx');toast('已导出')
}

function addImg(base,input){const file=input.files[0];if(file)readImg(base,file)}
function readImg(base,file){if(!file||!file.type.startsWith('image'))return;const reader=new FileReader();reader.onload=e=>{if(!fields[base+'_imgs'])fields[base+'_imgs']=[];if(fields[base+'_imgs'].length>=4){toast('max 4');return}fields[base+'_imgs'].push(e.target.result);render()};reader.readAsDataURL(file)}
function dropImg(e,base){e.preventDefault();e.stopPropagation();const file=e.dataTransfer.files[0];if(file)readImg(base,file)}
function pasteImg(e,base){const items=e.clipboardData&&e.clipboardData.items;if(!items)return;for(let i=0;i<items.length;i++){if(items[i].type.startsWith('image')){e.preventDefault();readImg(base,items[i].getAsFile());return}}}
function rmImg(base,idx){if(fields[base+'_imgs'])fields[base+'_imgs'].splice(idx,1);render()}
document.addEventListener("paste",function(e){var zone=document.activeElement;if(!zone||!zone.dataset||!zone.dataset.imgbase)zone=document.activeElement.closest&&document.activeElement.closest("[data-imgbase]");if(zone&&zone.dataset.imgbase){var items=e.clipboardData&&e.clipboardData.items;if(!items)return;for(var i=0;i<items.length;i++){if(items[i].type.indexOf("image")===0){e.preventDefault();readImg(zone.dataset.imgbase,items[i].getAsFile());return}}}});
document.addEventListener("drop",function(e){var el=e.target.closest("[data-imgbase]");if(el){e.preventDefault();readImg(el.dataset.imgbase,e.dataTransfer.files[0])}});
document.addEventListener("dragover",function(e){if(e.target.closest("[data-imgbase]"))e.preventDefault()});
document.addEventListener('click',function(e){if(e.target.tagName==='IMG'&&e.target.closest('.img-thumb')){viewImg(e.target.src)}});
function viewImg(src){document.getElementById("lbImg").src=src;document.getElementById("lightbox").classList.add("show")}
render();
